name: Run Azure Login with OpenID Connect
on:
  - push
  - workflow_dispatch
      
jobs: 
  test:
    permissions:
      id-token: write # Require write permission to Fetch an OIDC token.

    runs-on: ubuntu-latest
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        allow-no-subscriptions: true
        enable-AzPSSession: true

    - name: Azure PowerShell script
      uses: azure/powershell@v2
      with:
        azPSVersion: latest
        inlineScript: |
          Install-Module EntraAuth -Force
          Connect-EntraService -AsAzAccount
          $ExpirationThresholdDay = 14
          $apps = Invoke-EntraRequest 'applications?$filter=federatedIdentityCredentials/$count eq 0&$count=true' -Header @{ConsistencyLevel = 'eventual'} | Where-Object { $_.passwordCredentials.Count -gt 0 -or $_.keyCredentials.Count -gt 0 }

          foreach ($app in $apps) {
              $freshSecret, $oldSecret = $app.passwordCredentials.Where({ $_.endDateTime.AddDays(-$ExpirationThresholdDay) -gt (Get-Date) }, 'Split')
              $expiredSecret, $nearExpirationSecret = $oldSecret.Where({ $_.endDateTime -lt (Get-Date) }, 'Split')
              $freshCertSecret, $oldCertSecret = $app.keyCredentials.Where({ $_.endDateTime.AddDays(-$ExpirationThresholdDay) -gt (Get-Date) }, 'Split')
              $expiredCertSecret, $nearExpirationCertSecret = $oldCertSecret.Where({ $_.endDateTime -lt (Get-Date) }, 'Split')

              if ($freshSecret.Count -gt 0) { 
                  Write-Verbose ("App {0} ({1}) has fresh client secrets." -f $app.displayName, $app.appId)
                  continue 
              }
              if ($freshCertSecret.Count -gt 0) { 
                  Write-Verbose ("App {0} ({1}) has fresh cert secrets." -f $app.displayName, $app.appId)
                  continue
              }

              foreach ($secret in $nearExpirationSecret) {
                  "❗ Client Secret near expiry: {0} ({1}), Key ID {2} (Name '{3}'), expires {4:yyyy-MM-dd HH:mm:ss}" -f $app.displayName, $app.appId, $secret.keyId, $secret.displayName, $secret.endDateTime
              }
              
              foreach ($secret in $expiredSecret) {
                  "☢️ Client Secret expired: {0} ({1}), Key ID {2} (Name '{3}'), expires {4:yyyy-MM-dd HH:mm:ss}" -f $app.displayName, $app.appId, $secret.keyId, $secret.displayName, $secret.endDateTime
              }

              foreach ($secret in $nearExpirationCertSecret) {
                  "❗ Certificate Secret near expiry: {0} ({1}), Key ID {2} (Name '{3}'), expires {4:yyyy-MM-dd HH:mm:ss}" -f $app.displayName, $app.appId, $secret.keyId, $secret.displayName, $secret.endDateTime
              }

              foreach ($secret in $expiredCertSecret) {
                  "☢️ Certificate Secret expired: {0} ({1}), Key ID {2} (Name '{3}'), expires {4:yyyy-MM-dd HH:mm:ss}" -f $app.displayName, $app.appId, $secret.keyId, $secret.displayName, $secret.endDateTime
              }
          }